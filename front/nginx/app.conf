# Static file server for the Angular SPA.
# API routing (/api/*) is handled upstream by Traefik – no proxy_pass needed here.
server {
    listen 80;
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;

    # Serve the Angular SPA – fall back to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}

