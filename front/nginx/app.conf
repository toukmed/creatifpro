# HTTP server – serves the Angular SPA and proxies API calls to the backend
server {
    listen 80;
    listen [::]:80;

    server_name toukrichtemed.com www.toukrichtemed.com;
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's internal DNS resolver so upstream addresses are resolved
    # lazily (allows nginx to start even before the backend container is up).
    resolver 127.0.0.11 valid=10s ipv6=off;

    # LetsEncrypt ACME challenge (uncomment when enabling HTTPS)
    # location /.well-known/acme-challenge/ {
    #     root /var/www/certbot;
    #     allow all;
    # }

    # Proxy REST API calls to the Spring Boot backend.
    # No trailing slash on $backend so the /api/ prefix is preserved
    # (backend controllers are mapped under /api/*).
    location /api/ {
        set $backend http://back:8080;
        proxy_pass         $backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Serve the Angular SPA – fall back to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}

