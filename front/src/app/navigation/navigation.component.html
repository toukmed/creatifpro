<div class="sidebar-inner" [class.collapsed]="collapsed">
  <!-- Navigation -->
  <nav class="sidebar-nav">
    <span class="nav-section-label" *ngIf="!collapsed">Navigation</span>

    <div class="nav-list">
      <a
        *ngFor="let item of navLinks; trackBy: trackBy"
        [routerLink]="item.link"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: false }"
        class="nav-item"
        [matTooltip]="collapsed ? item.libelle : ''"
        matTooltipPosition="right">
        <span class="nav-icon-wrapper">
          <mat-icon class="nav-icon">{{ item.icon }}</mat-icon>
        </span>
        <span class="nav-label" *ngIf="!collapsed">{{ item.libelle }}</span>
        <span class="nav-indicator" *ngIf="!collapsed"></span>
      </a>
    </div>
  </nav>

  <!-- Footer -->
  <div class="sidebar-footer">
    <div class="footer-divider"></div>
    <button
      class="nav-item logout-item"
      (click)="onLogout()"
      [matTooltip]="collapsed ? 'Se déconnecter' : ''"
      matTooltipPosition="right">
      <span class="nav-icon-wrapper">
        <mat-icon class="nav-icon">logout</mat-icon>
      </span>
      <span class="nav-label" *ngIf="!collapsed">Se déconnecter</span>
    </button>
  </div>
</div>
