<mat-sidenav-container class="sidenav-container">
  <!-- Sidenav -->
  <mat-sidenav 
    #sidenav 
    mode="side" 
    [opened]="true" 
    [style.width]="'100px'">

    <mat-nav-list>
      <a mat-list-item *ngFor="let item of navLinks" [routerLink]="item.link">
        <mat-icon matListIcon>{{item.icon}}</mat-icon>
      </a>
    </mat-nav-list>
  </mat-sidenav>
</mat-sidenav-container>
