<nav>
  <mat-nav-list>
    <a mat-list-item *ngFor="let link of navLinks; trackBy: trackBy" [routerLink]="link.link">
      <div class="nav-link-content">
        <mat-icon *ngIf="link.icon" matListIcon>{{ link.icon }}</mat-icon>
        <span *ngIf="!collapsed">{{ link.libelle }}</span>
      </div>
    </a>
  </mat-nav-list>
</nav>
