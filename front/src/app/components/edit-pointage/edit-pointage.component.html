<app-edit-header
  [isReadOnly]="isReadOnly"
  [title]="displayHeaderTitle()"
  (backClicked)="manageBack()"
  (validateClicked)="validate()"
></app-edit-header>
<div>
  <form [formGroup]="addPointageForm" class="pointage-form">
    <mat-form-field appearance="outline" class="form-field">
      <mat-label>Projet</mat-label>
      <input
        matInput
        formControlName="project"
        [value]="entity?.project?.code"
        readonly
      />
    </mat-form-field>

    <mat-form-field appearance="outline" class="form-field">
      <mat-label>Employé</mat-label>
      <input
        matInput
        formControlName="employee"
        [value]="entity?.employee?.firstName + ' ' + entity?.employee?.lastName"
        readonly
      />
    </mat-form-field>

    <mat-form-field appearance="outline" class="form-field">
      <mat-label>Date du pointage</mat-label>
      <input
        matInput
        formControlName="pointageDate"
        readonly
      />
    </mat-form-field>

    <ng-container *ngIf="entityName === 'horaires'; else salaries">
      <mat-form-field appearance="outline" class="form-field">
        <mat-label>Pointage</mat-label>
        <input
          matInput
          type="number"
          formControlName="totalHours"
          min="0"
          max="12"
          step="0.5"
        />
      </mat-form-field>
    </ng-container>
    <ng-template #salaries>
      <mat-form-field appearance="outline" class="form-field">
        <mat-label>Pointage salarié</mat-label>
        <input
          matInput
          type="number"
          formControlName="totalHours"
          min="0"
          max="1"
          step="0.25"
        />
      </mat-form-field>
    </ng-template>

    <mat-form-field appearance="outline" class="form-field">
      <mat-label>Commentaire</mat-label>
      <textarea matInput formControlName="comment"></textarea>
    </mat-form-field>

    <div class="form-actions" *ngIf="!isReadOnly">
      <button mat-button type="button" (click)="manageBack()">Annuler</button>
      <button
        mat-raised-button
        color="primary"
        type="submit"
        (click)="validate()"
        [disabled]="addPointageForm.invalid || !addPointageForm.dirty"
      >
        Enregistrer
      </button>
    </div>
  </form>
</div>
