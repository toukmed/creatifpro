<div>
  <h3>
    Le pointage du
    <span class="primary"> {{ formatToShortDate(data.date) }}</span>
  </h3>
</div>
<div [formGroup]="addPointageForm">
  <div class="form-elements">
    <mat-card class="custom-card">
      <mat-card-content> </mat-card-content>
    </mat-card>
    <div class="card-container">
      <!-- Round circle with dynamic text in the center -->
      <div class="circle" [innerHTML]="initials"></div>
      <div class="card-content">
        <mat-card-title
          >{{ employe?.prenom }} {{ employe?.nom }}</mat-card-title
        >
        <mat-card-subtitle>{{ employe?.projet.nom }}</mat-card-subtitle>
        <mat-card-subtitle>{{ employe?.typeContrat }}</mat-card-subtitle>
        <mat-card-subtitle>{{ employe?.poste }}</mat-card-subtitle>
        <mat-card-subtitle>{{ employe?.numeroTelephone }}</mat-card-subtitle>
      </div>
    </div>
    <mat-form-field>
      <mat-label>Nombre d'heures</mat-label>
      <input
        matInput
        type="number"
        min="0"
        max="12"
        placeholder="Nombre d'heures"
        formControlName="pointage"
      />
    </mat-form-field>
    <mat-form-field>
      <mat-label>Commentaire</mat-label>
      <textarea
        style="height: 100px"
        matInput
        placeholder="Ex. Ajout d'heure supplémentaires"
        formControlName="commentaire"
      ></textarea>
    </mat-form-field>
    <div class="ml-10">
      <mat-slide-toggle formControlName="status"></mat-slide-toggle>
      <mat-label>{{
        data?.jourPointage?.status ? "Payé" : "Non payé"
      }}</mat-label>
    </div>
  </div>
</div>
<div class="button-row">
  <button mat-raised-button (click)="close()">Annuler</button>
  <button
    [disabled]="!addPointageForm.valid"
    mat-raised-button
    color="primary"
    (click)="save()"
  >
    Valider
  </button>
</div>
