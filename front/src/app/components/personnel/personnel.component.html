<h3>Personnel</h3>
<mat-card>
  <app-generic-table
    [columns]="columns"
    [data]="employes"
    [showPlaceholder]="false"
    [enabled]="false"
    [addable]="true"
    [searchable]="true"
    [isEditable]="true"
    [hasDetails]="true"
    (edit)="edit($event, false)"
    (showDetails)="edit($event, true)"
    (searched)="searchPersonnels($event)"
    (addClicked)="add()"
  >
  </app-generic-table>
</mat-card>
