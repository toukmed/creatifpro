<div class="dialog-container">
  <!-- Dialog Header -->
  <div class="dialog-header">
    <div class="header-content">
      <div class="header-icon">
        <mat-icon>{{ dialogIcon }}</mat-icon>
      </div>
      <div class="header-text">
        <h2>{{ dialogTitle }}</h2>
        <span class="header-subtitle">
          {{ 'Pointage'}}
        </span>
      </div>
    </div>
    <button mat-icon-button class="close-btn" (click)="cancel()" aria-label="Fermer">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <!-- Dialog Body -->
  <div class="dialog-body">
    <form [formGroup]="addPointageForm" class="dialog-form">
      <!-- Project Field -->
      <div class="form-section">
        <label class="field-label">
          Projet <span class="required">*</span>
        </label>
        <mat-form-field appearance="outline" class="dialog-field">
          <mat-select formControlName="project" placeholder="Sélectionner un projet">
            <mat-option *ngFor="let project of projects" [value]="project.code">
              <span class="option-code">{{ project.code }}</span> -
              <span class="option-ref"> {{ project.reference }}</span>
            </mat-option>
          </mat-select>
          <mat-error *ngIf="addPointageForm.get('project')?.hasError('required')">
            Le projet est requis
          </mat-error>
        </mat-form-field>
      </div>

      <!-- Employees Field -->
      <div class="form-section">
        <label class="field-label">
          Employés <span class="required">*</span>
        </label>
        <div class="chips-area" *ngIf="addPointageForm.get('employees')?.value?.length">
          <mat-chip-grid #employeeChipGrid aria-label="Employés sélectionnés">
            <mat-chip-row
              *ngFor="let empId of addPointageForm.get('employees')?.value"
              (removed)="removeSelectedEmployee(empId)"
              class="employee-chip"
            >
              <mat-icon matChipAvatar class="chip-avatar">person</mat-icon>
              {{ resolveEmployeeName(empId) }}
              <button matChipRemove aria-label="Retirer">
                <mat-icon>cancel</mat-icon>
              </button>
            </mat-chip-row>
          </mat-chip-grid>
        </div>
        <mat-form-field appearance="outline" class="dialog-field">
          <mat-select formControlName="employees" multiple placeholder="Sélectionner les employés">
            <mat-option *ngFor="let employee of employees" [value]="employee.id">
              {{ employee.firstName }} {{ employee.lastName }}
            </mat-option>
          </mat-select>
          <mat-error *ngIf="addPointageForm.get('employees')?.hasError('required')">
            Au moins un employé est requis
          </mat-error>
        </mat-form-field>
      </div>

      <!-- Date Range Field -->
      <div class="form-section">
        <label class="field-label">
          Période <span class="required">*</span>
        </label>
        <mat-form-field appearance="outline" class="dialog-field">
          <mat-date-range-input
            [rangePicker]="picker"
            formGroupName="pointageDateRange"
            [dateFilter]="disableFutureDates"
          >
            <input
              matInput
              matStartDate
              placeholder="Date de début"
              formControlName="start"
              required
              [max]="today"
            />
            <input
              matEndDate
              placeholder="Date de fin"
              formControlName="end"
              [max]="today"
            />
          </mat-date-range-input>
          <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
          <mat-date-range-picker #picker></mat-date-range-picker>
          <mat-error>La période est requise</mat-error>
        </mat-form-field>
      </div>

      <!-- Hours / Pointage Field -->
      <div class="form-section">
        <label class="field-label">
          Pointage <span class="required">*</span>
        </label>
        <mat-form-field appearance="outline" class="dialog-field">
          <input
            matInput
            type="number"
            formControlName="totalHours"
            [min]="0"
            [max]="12"
            [step]="1"
            [placeholder]="'Heures (0 - 12)'"
          />
          <span matSuffix class="field-suffix">{{'h'}}</span>
          <mat-error>Le pointage est requis</mat-error>
        </mat-form-field>
      </div>

      <!-- Comment Field -->
      <div class="form-section">
        <label class="field-label">Commentaire</label>
        <mat-form-field appearance="outline" class="dialog-field">
          <textarea
            matInput
            formControlName="comment"
            rows="3"
            placeholder="Ajouter un commentaire..."
          ></textarea>
        </mat-form-field>
      </div>
    </form>
  </div>

  <!-- Dialog Footer -->
  <div class="dialog-footer">
    <button mat-button class="btn-cancel" (click)="cancel()" type="button">
      {{ isReadOnly ? 'Fermer' : 'Annuler' }}
    </button>
    <button
      *ngIf="!isReadOnly"
      mat-flat-button
      class="btn-submit"
      (click)="submit()"
      [disabled]="submitting"
      type="button"
    >
      <mat-spinner *ngIf="submitting" diameter="18" class="btn-spinner"></mat-spinner>
      <mat-icon *ngIf="!submitting">{{ mode === 'edit' ? 'save' : 'add' }}</mat-icon>
      {{ submitting ? (mode === 'edit' ? 'Enregistrement...' : 'Création...') : (mode === 'edit' ? 'Enregistrer' : 'Créer le pointage') }}
    </button>
  </div>
</div>
