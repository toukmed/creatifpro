stages:
  - build
  - deploy

image: docker:latest

services:
  - docker:dind

variables:
  DOCKER_TLS_CERTDIR: ""

before_script:
  - docker info

build:
  stage: build
  script:
    - docker-compose -f docker-compose.yml build

deploy:
  stage: deploy
  only:
    - main
  script:
    - apk add --no-cache openssh
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan $VPS_HOST >> ~/.ssh/known_hosts
    - scp -r * root@$VPS_HOST:/root/$VPS_DIR
    - ssh root@$VPS_HOST 'cd /root/$VPS_DIR && git pull -r && docker-compose down && docker-compose up -d --build'
