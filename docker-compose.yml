version: '3.8'

services:
  db:
    image: postgres:17
    container_name: creatif_db
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - creatif-network
    restart: always

  back:
    build: ./back
    container_name: creatif_back
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/postgres
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: admin
    depends_on:
      - db
    ports:
      - "8080:8080"
    networks:
      - creatif-network
    restart: always
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 5

  nginx:
    build: ./front
    container_name: creatif_nginx
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt/live/erp.creatif-pro.com:/etc/letsencrypt/live/erp.creatif-pro.com:ro
      - /etc/letsencrypt/archive/erp.creatif-pro.com:/etc/letsencrypt/archive/erp.creatif-pro.com:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - creatif-network

volumes:
  postgres_data:

networks:
  creatif-network: