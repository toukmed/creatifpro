# ============================================================
# CreatifPro – Docker Compose
#
# Prerequisites:
#   Copy .env.example to .env and set your own passwords before
#   running `docker compose up -d`.
# ============================================================

services:

  # ──────────────────────────────────────────
  # Database – PostgreSQL 17
  # ──────────────────────────────────────────
  db:
    image: postgres:17-alpine
    container_name: creatif_db
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"   # bind to localhost only – not exposed publicly
    networks:
      - creatif-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ──────────────────────────────────────────
  # Backend – Spring Boot
  # ──────────────────────────────────────────
  back:
    build:
      context: ./back
      dockerfile: Dockerfile
    container_name: creatif_back
    env_file: .env
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      JAVA_OPTS: ${JAVA_OPTS:--XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0}
    depends_on:
      db:
        condition: service_healthy   # wait until postgres is ready
    ports:
      - "127.0.0.1:8080:8080"   # bind to localhost only – fronted by nginx
    networks:
      - creatif-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ──────────────────────────────────────────
  # Frontend – Angular + Nginx
  # ──────────────────────────────────────────
  nginx:
    build:
      context: ./front
      dockerfile: Dockerfile
    container_name: creatif_nginx
    ports:
      - "80:80"
    depends_on:
      back:
        condition: service_healthy   # wait until backend is ready
    networks:
      - creatif-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 32M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ──────────────────────────────────────────
  # TLS certificate management (uncomment to enable HTTPS)
  # ──────────────────────────────────────────
  # certbot:
  #   image: certbot/certbot:latest
  #   volumes:
  #     - ./certbot/www:/var/www/certbot:rw
  #     - ./certbot/conf:/etc/letsencrypt:rw
  #   networks:
  #     - creatif-network

  # certbot-renew:
  #   image: certbot/certbot:latest
  #   volumes:
  #     - ./certbot/www:/var/www/certbot:rw
  #     - ./certbot/conf:/etc/letsencrypt:rw
  #   entrypoint: ["/bin/sh", "-c"]
  #   command: ["while true; do certbot renew --webroot --webroot-path /var/www/certbot/ --quiet && sleep 12h; done"]
  #   networks:
  #     - creatif-network

volumes:
  postgres_data:
    driver: local

networks:
  creatif-network:
    driver: bridge