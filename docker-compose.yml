version: '3.8'

services:
  db:
    image: postgres:17
    container_name: creatif_db
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - creatif-network
    restart: always

  back:
    build: ./back
    container_name: creatif_back
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/postgres
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: admin
    depends_on:
      - db
    networks:
      - creatif-network
    restart: always

  front:
    build: ./front
    container_name: creatif_front
    depends_on:
      - back
    networks:
      - creatif-network
    restart: always

  nginx:
    image: nginx:alpine
    container_name: creatif_nginx
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/ssl:/etc/ssl
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - front
    networks:
      - creatif-network

volumes:
  postgres_data:

networks:
  creatif-network: